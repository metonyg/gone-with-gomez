<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Gomez Glitch — A Living Story</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #0b0e1a;
    --bg2:        #111628;
    --bg3:        #1a2040;
    --panel:      #141930;
    --border:     #2a3560;
    --text:       #e8eaf6;
    --text-muted: #8892b0;
    --accent:     #ff6b35;
    --accent2:    #ffd166;
    --cyan:       #06d6a0;
    --purple:     #9b5de5;
    --glitch-r:   rgba(255,107,53,0.7);
    --glitch-c:   rgba(6,214,160,0.7);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 80% 60% at 15% 0%, rgba(155,93,229,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 85% 100%, rgba(255,107,53,0.1) 0%, transparent 60%);
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 80px;
    overflow-x: hidden;
  }

  /* Star field */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 8%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 25%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 55%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 12%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 50% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 18% 88%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 68% 92%, rgba(255,255,255,0.4) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── MASTHEAD ── */
  .masthead {
    width: 100%;
    max-width: 860px;
    padding: 48px 0 36px;
    text-align: center;
    position: relative;
    animation: slideDown 0.7s ease both;
  }

  .eyebrow {
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.35em;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .story-title {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(32px, 7vw, 68px);
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 50%, var(--purple) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
    position: relative;
  }

  /* Glitch effect on title */
  .story-title::before,
  .story-title::after {
    content: attr(data-text);
    position: absolute;
    top: 0; left: 0; right: 0;
    background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 50%, var(--purple) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: glitch1 8s infinite;
  }
  .story-title::after { animation: glitch2 8s infinite; }

  @keyframes glitch1 {
    0%, 90%, 100% { clip-path: none; transform: none; opacity: 0; }
    92% { clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%); transform: translate(-3px, 0); opacity: 0.7; }
    94% { clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%); transform: translate(3px, 0); opacity: 0.7; }
    96% { opacity: 0; }
  }
  @keyframes glitch2 {
    0%, 93%, 100% { clip-path: none; transform: none; opacity: 0; }
    95% { clip-path: polygon(0 45%, 100% 45%, 100% 60%, 0 60%); transform: translate(4px, 0); opacity: 0.5; }
    97% { opacity: 0; }
  }

  .story-tagline {
    font-size: 16px;
    font-weight: 300;
    color: var(--text-muted);
    font-style: italic;
    margin-top: 10px;
  }

  /* Horizontal rule with glitch dots */
  .hr-glitch {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 28px auto 0;
    max-width: 400px;
  }
  .hr-glitch::before,
  .hr-glitch::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--border), transparent);
  }
  .hr-dots {
    display: flex;
    gap: 5px;
  }
  .hr-dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: blink 2.4s ease-in-out infinite;
  }
  .hr-dots span:nth-child(2) { background: var(--accent2); animation-delay: 0.4s; }
  .hr-dots span:nth-child(3) { background: var(--cyan); animation-delay: 0.8s; }

  @keyframes blink {
    0%, 100% { opacity: 1; } 50% { opacity: 0.2; }
  }

  /* ── CARD ── */
  .story-card {
    width: 100%;
    max-width: 860px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(155,93,229,0.1),
      0 24px 60px rgba(0,0,0,0.5),
      0 0 80px rgba(155,93,229,0.06);
    animation: slideUp 0.8s 0.15s ease both;
    position: relative;
  }

  /* Top accent bar */
  .card-accent-bar {
    height: 3px;
    background: linear-gradient(to right, var(--purple), var(--accent), var(--accent2), var(--cyan));
  }

  /* ── DAY HEADER ── */
  .day-header {
    padding: 28px 36px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .day-badge {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .day-number {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--accent);
    background: rgba(255,107,53,0.1);
    border: 1px solid rgba(255,107,53,0.3);
    padding: 5px 12px;
    border-radius: 20px;
  }

  .day-date {
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
  }

  .chapter-title-wrap h2 {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(16px, 3vw, 24px);
    font-weight: 700;
    color: var(--text);
    line-height: 1.25;
    margin-top: 6px;
  }

  /* ── ILLUSTRATION ── */
  .illustration-zone {
    position: relative;
    overflow: visible;
    background: var(--bg);
  }

  .illustration-zone img {
    width: 100%;
    height: auto;
    display: block;
    filter: saturate(1.1);
  }

  .illustration-placeholder {
    width: 100%;
    height: 260px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: linear-gradient(160deg, var(--bg3) 0%, var(--bg) 100%);
    color: var(--text-muted);
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
  }

  .illustration-placeholder .icon {
    font-size: 36px;
    opacity: 0.3;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* scanline overlay on image */
  .illustration-zone::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.04) 3px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
  }

  .illustration-caption {
    padding: 10px 36px 0;
    font-size: 13px;
    font-style: italic;
    color: var(--text-muted);
    text-align: center;
  }

  /* ── GLITCH LOG TAG ── */
  .glitch-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(6,214,160,0.08);
    border: 1px solid rgba(6,214,160,0.25);
    color: var(--cyan);
    font-size: 11px;
    font-family: 'Unbounded', sans-serif;
    letter-spacing: 0.08em;
    padding: 4px 12px;
    border-radius: 20px;
    margin: 20px 36px 0;
    width: fit-content;
  }

  .glitch-tag::before {
    content: '⚡';
    font-size: 10px;
  }

  /* ── STORY BODY ── */
  .story-body {
    padding: 24px 36px 32px;
    font-size: 18px;
    line-height: 1.85;
    font-weight: 300;
    color: var(--text);
  }

  .story-body p { margin-bottom: 1.3em; }

  /* Drop cap */
  .story-body p:first-child::first-letter {
    font-family: 'Unbounded', sans-serif;
    font-size: 4.4em;
    font-weight: 900;
    float: left;
    line-height: 0.78;
    margin: 0.06em 0.1em 0 0;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ── CHARACTERS ── */
  .characters-row {
    padding: 0 36px 28px;
    border-top: 1px solid var(--border);
    padding-top: 20px;
  }

  .characters-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .character-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text-muted);
    background: var(--bg2);
    cursor: default;
    transition: all 0.2s;
  }

  .chip:hover {
    border-color: var(--purple);
    color: var(--text);
    background: rgba(155,93,229,0.1);
  }

  .chip.sully {
    border-color: rgba(255,209,102,0.4);
    color: var(--accent2);
    background: rgba(255,209,102,0.05);
  }

  /* ── NAVIGATION ── */
  .page-nav {
    padding: 20px 36px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .nav-btn {
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 10px 22px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .nav-btn:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(255,107,53,0.08);
  }

  .nav-btn:disabled {
    opacity: 0.25;
    cursor: not-allowed;
  }

  .page-indicator {
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    flex: 1;
  }

  /* ── TIMELINE ── */
  .timeline-wrap {
    width: 100%;
    max-width: 860px;
    margin-top: 24px;
    padding: 0 4px;
    animation: slideUp 0.9s 0.3s ease both;
  }

  .timeline-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--text-muted);
    opacity: 0.5;
    margin-bottom: 8px;
    text-align: center;
    text-transform: uppercase;
  }

  .timeline-track {
    position: relative;
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    cursor: pointer;
  }

  .timeline-fill {
    position: absolute;
    left: 0; top: 0;
    height: 100%;
    background: linear-gradient(to right, var(--purple), var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .timeline-thumb {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 14px; height: 14px;
    background: var(--accent2);
    border: 2px solid var(--bg);
    border-radius: 50%;
    box-shadow: 0 0 12px rgba(255,209,102,0.6);
    transition: left 0.4s ease;
    pointer-events: none;
  }

  .timeline-ends {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
  }

  .timeline-ends span {
    font-size: 11px;
    color: var(--text-muted);
    opacity: 0.4;
    font-style: italic;
  }

  /* act markers */
  .act-markers {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }

  .act-pip {
    position: absolute;
    top: -3px;
    width: 2px; height: 10px;
    background: var(--border);
    border-radius: 1px;
  }

  /* ── LOADING ── */
  .loading-state {
    padding: 80px 36px;
    text-align: center;
  }

  .glitch-loader {
    font-family: 'Unbounded', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--accent);
    margin-bottom: 16px;
    animation: glitchLoad 1.2s ease-in-out infinite;
  }

  @keyframes glitchLoad {
    0%, 100% { transform: none; opacity: 1; }
    25% { transform: translate(2px, 0) skewX(1deg); opacity: 0.85; }
    50% { transform: translate(-2px, 0) skewX(-1deg); opacity: 0.9; }
    75% { transform: translate(1px, 0); opacity: 0.95; }
  }

  .loading-text {
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--text-muted);
    opacity: 0.6;
  }

  /* ── ANIMATIONS ── */
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .page-reveal { animation: slideUp 0.45s ease both; }

  /* ── FOOTER ── */
  .footer {
    margin-top: 32px;
    font-size: 12px;
    color: var(--text-muted);
    opacity: 0.35;
    text-align: center;
    font-style: italic;
    letter-spacing: 0.05em;
  }

  @media (max-width: 600px) {
    .day-header, .story-body, .characters-row, .page-nav { padding-left: 20px; padding-right: 20px; }
    .glitch-tag { margin-left: 20px; }
    .illustration-caption { padding-left: 20px; padding-right: 20px; }
    .story-body { font-size: 16px; }
    .nav-btn { font-size: 9px; padding: 9px 14px; }
  }
</style>
</head>
<body>

<header class="masthead">
  <div class="eyebrow">A Living Story · One Page Per Day</div>
  <h1 class="story-title" data-text="The Gomez Glitch" id="story-title">The Gomez Glitch</h1>
  <p class="story-tagline" id="story-tagline">Somewhere between yesterday and tomorrow, a family finds the way home.</p>
  <div class="hr-glitch">
    <div class="hr-dots">
      <span></span><span></span><span></span>
    </div>
  </div>
</header>

<main class="story-card" id="story-card">
  <div class="card-accent-bar"></div>
  <div id="page-content">
    <div class="loading-state">
      <div class="glitch-loader">⌛</div>
      <div class="loading-text">LOCATING THE TIMELINE…</div>
    </div>
  </div>
</main>

<div class="timeline-wrap" id="timeline-wrap" style="display:none">
  <div class="timeline-label">The Cascade Timeline</div>
  <div class="timeline-track" id="timeline-track">
    <div class="act-markers">
      <div class="act-pip" style="left:20.5%"></div>
      <div class="act-pip" style="left:49.3%"></div>
      <div class="act-pip" style="left:76.7%"></div>
    </div>
    <div class="timeline-fill" id="timeline-fill"></div>
    <div class="timeline-thumb" id="timeline-thumb"></div>
  </div>
  <div class="timeline-ends">
    <span>Day 1 · Lisbon</span>
    <span id="timeline-end">Day 365</span>
  </div>
</div>

<footer class="footer">Updated daily. Glitches may occur. The Gomez family is probably fine.</footer>

<script>
// ─────────────────────────────────────────────
// CONFIG — update these after creating your repo
// ─────────────────────────────────────────────
const CONFIG = {
  repoOwner:   'metonyg',
  repoName:    'gone-with-gomez',
  branch:      'main',
  storyTitle:  'The Gomez Glitch',
  storyTagline:'Somewhere between yesterday and tomorrow, a family finds the way home — and it\'s shaped like an island.',
};

// ─────────────────────────────────────────────
// SAMPLE DATA — shown before real pages exist
// ─────────────────────────────────────────────
const SAMPLE_PAGES = [
  {
    day: 1,
    date: '2025-01-01',
    chapterTitle: 'Flight to Somewhere Probably',
    glitchName: 'The Lisbon Luncheon Loop',
    imageUrl: '',
    imageCaption: 'Lisbon, Portugal. Tuesday, 12:47pm. Again.',
    characters: ['Anthony', 'Luisana', 'Aaliyah', 'Elijah', 'Sully 🐾'],
    text: `The boarding passes said Lisbon. Anthony had booked the flights forty minutes before they left the house, which was how he always did it, which was why Luisana kept a go-bag packed at all times, which was why Aaliyah had developed a stress response to the sound of her dad refreshing airline apps at weird hours.

"It was a great deal," Anthony said, for the fourth time since the taxi. He had the look of a man who knew he was not going to stop saying this.

"It's fine," said Luisana, who had already identified three good coffee spots near the airport and was choosing between them mentally. "It's Lisbon. Lisbon is wonderful."

Elijah was asleep across both their laps before the plane reached cruising altitude. Sully, improbably cleared for the cabin via a travel document Anthony had found on a forum and printed at a pharmacy, was also asleep, curled into Elijah's armpit like a small pastry. Aaliyah had both earbuds in — one earbud; she never used both — and was watching the flight tracker the way other people watched thrillers.

The screen glitched.

Not the whole screen. Just the little plane icon. It stuttered, reversed three seconds of its path, then continued forward as though nothing had happened. Aaliyah pulled out her earbud. She looked at the screen. She looked at it for a long time.

"Dad," she said.

"Hm."

"Did you see that?"

Anthony looked at the screen, which was now perfectly normal. "See what, mija?"

Aaliyah looked at the little plane icon for another moment. Then she opened her notebook to a fresh page and drew a small, precise arrow pointing left. Below it, she wrote: it went backward.`
  },
  {
    day: 2,
    date: '2025-01-02',
    chapterTitle: 'The Same Tuesday, Twice',
    glitchName: 'The Lisbon Luncheon Loop (Confirmed)',
    imageUrl: '',
    imageCaption: 'The same waiter. The same dropped fork. 12:47pm, again.',
    characters: ['Anthony', 'Luisana', 'Aaliyah', 'Elijah', 'Sully 🐾'],
    text: `The waiter dropped his fork at 12:47pm. Aaliyah noted the time.

At 12:47pm the next day — which the city appeared to believe was the same day — the waiter dropped his fork again. Same fork. Same sound. Same surprised expression, as though he had not spent the last twenty-four hours also dropping that fork.

"He keeps doing that," said Elijah, delighted.

"Eat your custard tart," said Luisana.

Sully was staring at the far corner of the square with an intensity that didn't belong on a six-month-old puppy's face. Three short barks — quick, declarative — then silence. Elijah looked at him knowingly.

"Small one," Elijah reported. "Sully says small one."

"Sully says 'I am a puppy and I saw a pigeon,'" said Aaliyah, but she wrote it down anyway. Small one. 12:47pm. Near the fork waiter.

Her map was taking shape. She didn't know yet what it was a map of. That felt important — the not-knowing. Like when you were reading a book and you could feel the plot gathering itself in the pages ahead, dense and inevitable, and the characters were still cheerfully eating lunch.

Anthony was cheerfully eating lunch. He had also befriended the fork waiter, whose name was Tomás and whose cousin, it turned out, had a restaurant in the Alfama district that was not in any app, and they were going there tonight.

The city looped. The fork fell. Aaliyah drew a small circle on her map and labeled it: here.`
  }
];

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let allPages = [];
let currentIndex = 0;

// ─────────────────────────────────────────────
// LOAD pages from GitHub or fall back to sample
// ─────────────────────────────────────────────
async function loadPagesFromSource(indexUrl, pageBaseUrl) {
  const resp = await fetch(indexUrl);
  if (!resp.ok) return [];

  const index = await resp.json();
  const pagePromises = index.pages.map(async (ref) => {
    const pr = await fetch(`${pageBaseUrl}${ref.file}`);
    return pr.ok ? pr.json() : null;
  });

  return (await Promise.all(pagePromises))
    .filter(Boolean)
    .sort((a, b) => a.day - b.day);
}

async function loadPages() {
  document.getElementById('story-title').textContent = CONFIG.storyTitle;
  document.getElementById('story-title').dataset.text = CONFIG.storyTitle;
  document.getElementById('story-tagline').textContent = CONFIG.storyTagline;

  const remoteBaseUrl = `https://raw.githubusercontent.com/${CONFIG.repoOwner}/${CONFIG.repoName}/${CONFIG.branch}/pages/`;
  const sources = [
    { indexUrl: 'pages/index.json', pageBaseUrl: 'pages/' },
    { indexUrl: `${remoteBaseUrl}index.json`, pageBaseUrl: remoteBaseUrl },
  ];

  for (const source of sources) {
    try {
      allPages = await loadPagesFromSource(source.indexUrl, source.pageBaseUrl);
      if (allPages.length > 0) break;
    } catch(e) {}
  }

  if (allPages.length === 0) allPages = SAMPLE_PAGES;

  currentIndex = allPages.length - 1;
  renderPage(currentIndex);
  renderTimeline();
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function renderPage(idx) {
  const page = allPages[idx];
  const el = document.getElementById('page-content');

  const dateStr = page.date
    ? new Date(page.date + 'T12:00:00').toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'})
    : '';

  const imageHtml = page.imageUrl
    ? `<div class="illustration-zone"><img src="${page.imageUrl}" alt="${page.imageCaption || ''}"></div>`
    : `<div class="illustration-zone">
        <div class="illustration-placeholder">
          <div class="icon">🌀</div>
          <div>Illustration generating…</div>
        </div>
       </div>`;

  const captionHtml = page.imageCaption
    ? `<p class="illustration-caption">${page.imageCaption}</p>` : '';

  const glitchHtml = page.glitchName
    ? `<div class="glitch-tag">${page.glitchName}</div>` : '';

  const chipsHtml = (page.characters || []).map(c =>
    `<span class="chip${c.includes('🐾') ? ' sully' : ''}">${c}</span>`
  ).join('');

  const bodyHtml = (page.text || '').split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${p.trim()}</p>`).join('');

  el.innerHTML = `<div class="page-reveal">
    <div class="day-header">
      <div>
        <div class="day-badge">
          <span class="day-number">DAY ${page.day}</span>
          <span class="day-date">${dateStr}</span>
        </div>
        <div class="chapter-title-wrap"><h2>${page.chapterTitle || 'Untitled'}</h2></div>
      </div>
    </div>
    ${imageHtml}
    ${captionHtml}
    ${glitchHtml}
    <div class="story-body">${bodyHtml}</div>
    <div class="characters-row">
      <div class="characters-label">In this page</div>
      <div class="character-chips">${chipsHtml}</div>
    </div>
    <div class="page-nav">
      <button class="nav-btn" onclick="navigate(-1)" ${idx===0?'disabled':''}>← Prev</button>
      <span class="page-indicator">Page ${idx+1} of ${allPages.length}</span>
      <button class="nav-btn" onclick="navigate(1)" ${idx===allPages.length-1?'disabled':''}>Next →</button>
    </div>
  </div>`;

  updateTimeline();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function navigate(dir) {
  const next = currentIndex + dir;
  if (next < 0 || next >= allPages.length) return;
  currentIndex = next;
  renderPage(currentIndex);
}

// ─────────────────────────────────────────────
// TIMELINE
// ─────────────────────────────────────────────
function renderTimeline() {
  if (allPages.length <= 1) return;
  document.getElementById('timeline-wrap').style.display = 'block';
  document.getElementById('timeline-end').textContent = `Day ${allPages[allPages.length-1].day}`;
  updateTimeline();

  document.getElementById('timeline-track').addEventListener('click', function(e) {
    const rect = this.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    currentIndex = Math.round(pct * (allPages.length - 1));
    renderPage(currentIndex);
  });
}

function updateTimeline() {
  if (allPages.length <= 1) return;
  const pct = (currentIndex / (allPages.length - 1)) * 100;
  document.getElementById('timeline-fill').style.width = pct + '%';
  document.getElementById('timeline-thumb').style.left = pct + '%';
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
});

loadPages();
</script>
</body>
</html>
